name: Build Custom Arch ISO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm archiso grub

      - name: Setup Chaotic AUR
        run: |
          pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 3056513887B78AEB
          pacman -U --noconfirm 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst'
          pacman -U --noconfirm 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-mirrorlist.pkg.tar.zst'
          echo -e "\n[chaotic-aur]\nInclude = /etc/pacman.d/chaotic-mirrorlist" >> /etc/pacman.conf
          pacman -Sy --noconfirm

      - name: Prepare archiso profile
        run: |
          # Start with the upstream releng profile as base
          cp -r /usr/share/archiso/configs/releng ./custom-iso

          # Overwrite with our files
          cp packages.x86_64 ./custom-iso/packages.x86_64
          cp profiledef.sh ./custom-iso/profiledef.sh

          # Copy airootfs overlay
          if [ -d "airootfs" ]; then
            cp -r airootfs/. ./custom-iso/airootfs/
          fi

          # Inject chaotic-aur into the ISO's pacman.conf so packages install inside ISO
          echo -e "\n[chaotic-aur]\nInclude = /etc/pacman.d/chaotic-mirrorlist" >> ./custom-iso/pacman.conf

          # Copy chaotic mirrorlist into the ISO's airootfs so it's available at install time
          mkdir -p ./custom-iso/airootfs/etc/pacman.d/
          cp /etc/pacman.d/chaotic-mirrorlist ./custom-iso/airootfs/etc/pacman.d/chaotic-mirrorlist

          # Ensure customize script is executable
          if [ -f "./custom-iso/airootfs/root/customize_airootfs.sh" ]; then
            chmod +x ./custom-iso/airootfs/root/customize_airootfs.sh
          fi

      - name: Build ISO
        run: |
          mkarchiso -v -w /tmp/work -o /tmp/out ./custom-iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: Custom-Arch-ISO
          path: /tmp/out/*.iso
          retention-days: 7
